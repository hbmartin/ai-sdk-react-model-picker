name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Type Check, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript compiler check
        run: pnpm run typecheck

      - name: Run ESLint
        run: pnpm run lint

      - name: Check code formatting with Prettier
        run: pnpm exec prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: Run tests
        run: pnpm test

      - name: Build library
        run: pnpm run build

      - name: Check for security vulnerabilities
        run: pnpm audit --audit-level=moderate

      - name: Validate packaging
        run: pnpm run validate:packaging

  compatibility:
    name: Check AI SDK Compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update AI SDK providers to latest
        run: pnpm update --latest @ai-sdk/openai @ai-sdk/anthropic @ai-sdk/google

      - name: Build with latest AI SDK providers
        run: pnpm run build
